<!DOCTYPE html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>AR — Eldrem (MindAR)</title>
    <link rel="stylesheet" href="/assets/site.css" />
    <link rel="stylesheet" href="/assets/ar-demo.css" />
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="/assets/gltf-animation-player.js"></script>
  </head>
  <body class="ar-demo">
    <div id="overlay">
      <strong>Se încarcă MindAR…</strong>
      <p id="overlay-msg">Pregătire cameră și target Eldrem.</p>
    </div>

    <div id="model-status" role="status" aria-live="polite"></div>
    <div id="model-picker" aria-label="Alege model 3D"></div>
    <div id="hint" aria-live="polite">Îndreaptă camera spre logo-ul Eldrem</div>

    <a-scene
      mindar-image="imageTargetSrc: /assets/mind/eldrem-logomark.mind; autoStart: true;"
      color-space="sRGB"
      renderer="alpha: true; colorManagement: true; physicallyCorrectLights: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets>
        <a-asset-item
          id="duck"
          src="https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Duck/glTF-Binary/Duck.glb"
        ></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="eldrem-target" mindar-image-target="targetIndex: 0">
        <a-entity
          id="ar-model"
          position="0 0 0"
          rotation="0 0 0"
          scale="1 1 1"
          gltf-animation-player="clip: Animation"
        ></a-entity>
      </a-entity>
    </a-scene>

    <script src="/assets/site-nav.js"></script>
    <script>
      const MODELS = [
        {
          label: "Al meu",
          url: "/assets/models/model.glb",
          clip: "Animation",
        },
        {
          label: "Rață",
          url: "#duck",
        },
      ];

      const mindTarget = document.getElementById("eldrem-target");
      const arModel = document.getElementById("ar-model");
      const overlay = document.getElementById("overlay");
      const overlayMsg = document.getElementById("overlay-msg");
      const hint = document.getElementById("hint");
      const modelStatus = document.getElementById("model-status");
      const modelPicker = document.getElementById("model-picker");
      const scene = document.querySelector("a-scene");

      let modelReady = false;
      let targetVisible = false;
      let currentModelIndex = 0;
      let pickerButtons = [];

      function setModelStatus(kind, message) {
        if (!modelStatus) return;
        modelStatus.textContent = message;
        modelStatus.className = kind ? `visible ${kind}` : "visible";
      }

      function countMeshes() {
        let n = 0;
        arModel.object3D.traverse((node) => {
          if (node.isMesh) n += 1;
        });
        return n;
      }

      function updatePickerActive() {
        pickerButtons.forEach((btn, i) => {
          btn.classList.toggle("active", i === currentModelIndex);
        });
      }

      function syncAnimationPlayer() {
        const current = MODELS[currentModelIndex];
        arModel.setAttribute("gltf-animation-player", {
          clip: current.clip || "",
          active: Boolean(current.clip),
        });
      }

      function onModelLoaded() {
        modelReady = true;
        syncAnimationPlayer();

        arModel.object3D.traverse((node) => {
          node.frustumCulled = false;
        });

        const current = MODELS[currentModelIndex];
        const meshes = countMeshes();
        if (!meshes) {
          setModelStatus("err", `${current.label}: fără mesh`);
          return;
        }
        setModelStatus("ok", `${current.label} — ${meshes} mesh`);
        updateHint();
      }

      function onModelError(event) {
        const current = MODELS[currentModelIndex];
        console.error("GLB error", current.url, event.detail);
        setModelStatus("err", `Eroare: ${current.label}`);
      }

      function updateHint() {
        const name = MODELS[currentModelIndex].label;
        if (!targetVisible) {
          hint.textContent = "Caut logo-ul Eldrem…";
        } else if (!modelReady) {
          hint.textContent = `Logo OK — încarcă ${name}…`;
        } else {
          hint.textContent = `Logo OK — ${name}`;
        }
      }

      function loadModel(index) {
        if (index < 0 || index >= MODELS.length) return;

        currentModelIndex = index;
        modelReady = false;
        updatePickerActive();

        const current = MODELS[index];
        setModelStatus("warn", `Se încarcă ${current.label}…`);
        syncAnimationPlayer();

        const player = arModel.components["gltf-animation-player"];
        if (player) player.teardownMixer();

        arModel.removeAttribute("gltf-model");
        requestAnimationFrame(() => {
          if (current.url === "#duck") {
            arModel.setAttribute("gltf-model", "#duck");
          } else {
            arModel.setAttribute("gltf-model", current.url);
          }
        });
      }

      function buildModelPicker() {
        modelPicker.innerHTML = "";
        pickerButtons = MODELS.map((model, index) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.textContent = model.label;
          btn.addEventListener("click", () => loadModel(index));
          modelPicker.appendChild(btn);
          return btn;
        });
        updatePickerActive();
      }

      function showArUI() {
        overlay.classList.add("hidden");
        hint.classList.add("visible");
        modelPicker.classList.add("visible");
        if (modelStatus) modelStatus.classList.add("visible");
        updateHint();
      }

      buildModelPicker();

      arModel.addEventListener("model-loaded", onModelLoaded);
      arModel.addEventListener("model-error", onModelError);

      scene.addEventListener("arReady", () => {
        showArUI();
        loadModel(0);
      });

      scene.addEventListener("arError", () => {
        overlay.classList.remove("hidden");
        overlayMsg.textContent =
          "MindAR nu a pornit. Verifică HTTPS, permisiune cameră și fișierul assets/mind/eldrem-logomark.mind";
        setModelStatus("err", "MindAR arError — lipsește .mind?");
      });

      mindTarget.addEventListener("targetFound", () => {
        targetVisible = true;
        updateHint();
      });

      mindTarget.addEventListener("targetLost", () => {
        targetVisible = false;
        updateHint();
      });

      arModel.addEventListener("anim-started", (evt) => {
        const { clip, running } = evt.detail;
        const current = MODELS[currentModelIndex];
        setModelStatus(
          "ok",
          `${current.label} — ${clip}${running ? " ▶" : ""}`
        );
      });
    </script>
  </body>
</html>
