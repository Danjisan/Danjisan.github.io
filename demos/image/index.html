<!DOCTYPE html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>AR — Eldrem (NFT)</title>
    <link rel="stylesheet" href="/assets/site.css" />
    <link rel="stylesheet" href="/assets/ar-demo.css" />
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <script src="/assets/gltf-animation-player.js"></script>
  </head>
  <body class="ar-demo">
    <div class="arjs-loader" id="loader">
      <div>
        <strong>Se încarcă tracking-ul…</strong>
        <p>Descriptorii NFT pentru logo Eldrem.</p>
      </div>
    </div>

    <div id="model-status" role="status" aria-live="polite"></div>
    <div id="hint" aria-live="polite">Îndreaptă camera spre logo-ul Eldrem</div>

    <a-scene
      embedded
      vr-mode-ui="enabled: false"
      renderer="logarithmicDepthBuffer: true; precision: medium;"
      arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;"
    >
      <a-nft
        id="eldrem-nft"
        type="nft"
        url="/assets/nft/eldrem-logomark/eldrem-logomark"
        smooth="true"
        smoothCount="5"
        emitevents="true"
      >
        <a-entity
          id="ar-model"
          position="0 0 0"
          rotation="0 0 0"
          scale="1 1 1"
          gltf-model="/assets/models/model.glb"
          gltf-animation-player="clip: Animation"
        ></a-entity>
      </a-nft>
      <a-entity camera></a-entity>
    </a-scene>

    <script src="/assets/site-nav.js"></script>
    <script>
      const loader = document.getElementById("loader");
      const hint = document.getElementById("hint");
      const modelStatus = document.getElementById("model-status");
      const arModel = document.getElementById("ar-model");
      const nftMarker = document.getElementById("eldrem-nft");
      const scene = document.querySelector("a-scene");

      function setModelStatus(kind, message) {
        if (!modelStatus) return;
        modelStatus.textContent = message;
        modelStatus.className = kind ? `visible ${kind}` : "visible";
      }

      function hideLoader() {
        loader.classList.add("hidden");
        hint.classList.add("visible");
        modelStatus.classList.add("visible");
        hint.textContent = "Ține camera spre logo-ul Eldrem (JPG pe ecran sau print)";
      }

      arModel.addEventListener("model-loaded", () => {
        setModelStatus("ok", "Model încărcat");
      });

      arModel.addEventListener("model-error", (e) => {
        console.error(e.detail);
        setModelStatus("err", "Eroare la model GLB");
      });

      arModel.addEventListener("anim-started", (evt) => {
        const { clip, running } = evt.detail;
        setModelStatus("ok", `${clip}${running ? " ▶" : ""}`);
      });

      scene.addEventListener("loaded", () => {
        setTimeout(hideLoader, 800);
      });

      nftMarker.addEventListener("markerFound", () => {
        hint.textContent = "Logo detectat";
      });

      nftMarker.addEventListener("markerLost", () => {
        hint.textContent = "Caut logo-ul Eldrem…";
      });
    </script>
  </body>
</html>
