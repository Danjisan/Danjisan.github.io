<!DOCTYPE html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>AR — Eldrem (NFT)</title>
    <link rel="stylesheet" href="/assets/site.css" />
    <link rel="stylesheet" href="/assets/ar-demo.css" />
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <script src="/assets/gltf-animation-player.js"></script>
  </head>
  <body class="ar-demo">
    <div id="overlay">
      <strong>Se încarcă AR…</strong>
      <p>Ține camera spre logo-ul Eldrem (JPG pe ecran sau print).</p>
    </div>

    <div id="model-status" role="status" aria-live="polite"></div>
    <div id="scale-controls" aria-label="Scale model">
      <button type="button" id="scale-down" aria-label="Scale minus">−</button>
      <span id="scale-value">1</span>
      <button type="button" id="scale-up" aria-label="Scale plus">+</button>
    </div>
    <div id="model-picker" aria-label="Alege model 3D"></div>
    <button type="button" id="debug-toggle" aria-pressed="false">
      Info AR
    </button>
    <pre id="debug-panel" aria-live="polite"></pre>
    <canvas id="marker-debug-canvas"></canvas>
    <div id="hint" aria-live="polite">Îndreaptă camera spre logo-ul Eldrem</div>

    <a-scene embedded arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;">
      <a-nft
        id="eldrem-nft"
        type="nft"
        url="/assets/nft/eldrem-logomark/eldrem-logomark"
        smooth="true"
        smoothCount="5"
        emitevents="true"
      >
        <a-entity
          id="ar-model"
          position="0 0 0"
          rotation="0 0 0"
          scale="1 1 1"
          gltf-animation-player="clip: Animation"
        ></a-entity>
      </a-nft>
      <a-entity camera></a-entity>
    </a-scene>

    <script src="/assets/site-nav.js"></script>
    <script>
      const MODELS = [
        {
          label: "Al meu",
          url: "/assets/models/model-nft.glb",
          scale: 1,
          clip: "Animation",
        },
        {
          label: "Rață",
          url: "https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Duck/glTF-Binary/Duck.glb",
          scale: 1,
        },
      ];

      const nftMarker = document.getElementById("eldrem-nft");
      const arModel = document.getElementById("ar-model");
      const overlay = document.getElementById("overlay");
      const hint = document.getElementById("hint");
      const modelStatus = document.getElementById("model-status");
      const modelPicker = document.getElementById("model-picker");
      const scaleControls = document.getElementById("scale-controls");
      const scaleDown = document.getElementById("scale-down");
      const scaleUp = document.getElementById("scale-up");
      const scaleValue = document.getElementById("scale-value");
      const scene = document.querySelector("a-scene");

      const MIN_SCALE = 1;
      const SCALE_STEP = 1;

      let modelReady = false;
      let currentModelIndex = 0;
      let pickerButtons = [];
      let manualScale = 1;
      let markerTracked = false;
      let debugOpen = false;

      const debugToggle = document.getElementById("debug-toggle");
      const debugPanel = document.getElementById("debug-panel");
      const markerCanvas = document.getElementById("marker-debug-canvas");
      const markerCtx = markerCanvas?.getContext("2d");

      const _worldPos = new THREE.Vector3();
      const _camPos = new THREE.Vector3();
      const _modelWorld = new THREE.Vector3();
      const _corner = new THREE.Vector3();

      function fmt(n) {
        return Number.isFinite(n) ? n.toFixed(3) : "—";
      }

      function radToDeg(r) {
        return ((r * 180) / Math.PI).toFixed(1);
      }

      function getCamera3D() {
        const camEl = document.querySelector("[camera]");
        return camEl?.getObject3D("camera") || scene?.camera;
      }

      function projectToScreen(worldVec, camera3d, w, h) {
        _corner.copy(worldVec).project(camera3d);
        if (_corner.z > 1) return null;
        return {
          x: (_corner.x * 0.5 + 0.5) * w,
          y: (-_corner.y * 0.5 + 0.5) * h,
        };
      }

      function drawMarkerOutline() {
        if (!markerCtx || !markerCanvas || !debugOpen || !markerTracked) {
          if (markerCanvas) markerCanvas.classList.remove("visible");
          return;
        }

        const camera3d = getCamera3D();
        if (!camera3d) return;

        const w = window.innerWidth;
        const h = window.innerHeight;
        if (markerCanvas.width !== w || markerCanvas.height !== h) {
          markerCanvas.width = w;
          markerCanvas.height = h;
        }
        markerCtx.clearRect(0, 0, w, h);

        const hw = 0.5;
        const localCorners = [
          [-hw, -hw, 0],
          [hw, -hw, 0],
          [hw, hw, 0],
          [-hw, hw, 0],
        ];

        const screenPts = [];
        for (const [x, y, z] of localCorners) {
          _corner.set(x, y, z).applyMatrix4(nftMarker.object3D.matrixWorld);
          const p = projectToScreen(_corner, camera3d, w, h);
          if (p) screenPts.push(p);
        }

        if (screenPts.length < 4) return;

        markerCanvas.classList.add("visible");
        markerCtx.strokeStyle = "rgba(0, 255, 140, 0.9)";
        markerCtx.lineWidth = 2;
        markerCtx.beginPath();
        markerCtx.moveTo(screenPts[0].x, screenPts[0].y);
        for (let i = 1; i < screenPts.length; i++) {
          markerCtx.lineTo(screenPts[i].x, screenPts[i].y);
        }
        markerCtx.closePath();
        markerCtx.stroke();

        const cx = screenPts.reduce((s, p) => s + p.x, 0) / 4;
        const cy = screenPts.reduce((s, p) => s + p.y, 0) / 4;
        markerCtx.fillStyle = "rgba(0, 255, 140, 0.95)";
        markerCtx.beginPath();
        markerCtx.arc(cx, cy, 5, 0, Math.PI * 2);
        markerCtx.fill();
      }

      function updateDebugPanel() {
        if (!debugPanel || !debugOpen) return;

        if (!markerTracked) {
          debugPanel.textContent =
            "NFT: nedetectat\n\nȚine camera pe logo Eldrem (JPG).";
          drawMarkerOutline();
          return;
        }

        nftMarker.object3D.getWorldPosition(_worldPos);
        arModel.object3D.getWorldPosition(_modelWorld);

        const camera3d = getCamera3D();
        let dist = 0;
        if (camera3d) {
          camera3d.getWorldPosition(_camPos);
          dist = _worldPos.distanceTo(_camPos);
        }

        const mLocal = arModel.object3D.position;
        const mRot = arModel.object3D.rotation;
        const nRot = nftMarker.object3D.rotation;
        const mScale = arModel.getAttribute("scale");

        const box = new THREE.Box3().setFromObject(nftMarker.object3D);
        const size = box.getSize(new THREE.Vector3());

        debugPanel.textContent = [
          "═══ NFT marker (logo) ═══",
          `Detectat: da`,
          `Centru (world): ${fmt(_worldPos.x)}, ${fmt(_worldPos.y)}, ${fmt(_worldPos.z)}`,
          `Rotație (°): ${radToDeg(nRot.x)}, ${radToDeg(nRot.y)}, ${radToDeg(nRot.z)}`,
          `BBox world (est.): ${fmt(size.x)} × ${fmt(size.y)} × ${fmt(size.z)}`,
          `Distanță cameră: ${fmt(dist)}`,
          "",
          "═══ Model 3D ═══",
          `Local pos: ${fmt(mLocal.x)}, ${fmt(mLocal.y)}, ${fmt(mLocal.z)}`,
          `Local rot (°): ${radToDeg(mRot.x)}, ${radToDeg(mRot.y)}, ${radToDeg(mRot.z)}`,
          `Scale: ${mScale}`,
          `World pos: ${fmt(_modelWorld.x)}, ${fmt(_modelWorld.y)}, ${fmt(_modelWorld.z)}`,
          "",
          "Notă: originea NFT ≈ centrul imaginii.",
          "Contur verde = ~1×1 unit. AR (pătrat training).",
        ].join("\n");

        drawMarkerOutline();
      }

      function setModelStatus(kind, message) {
        if (!modelStatus) return;
        modelStatus.textContent = message;
        modelStatus.className = kind ? `visible ${kind}` : "visible";
      }

      function updateScaleButtons() {
        if (scaleDown) scaleDown.disabled = manualScale <= MIN_SCALE;
      }

      function applyScale(s) {
        manualScale = Math.max(MIN_SCALE, Math.round(s));
        arModel.setAttribute(
          "scale",
          `${manualScale} ${manualScale} ${manualScale}`
        );
        if (scaleValue) scaleValue.textContent = String(manualScale);
        updateScaleButtons();
      }

      function changeScale(delta) {
        applyScale(manualScale + delta * SCALE_STEP);
      }

      function countMeshes() {
        let n = 0;
        arModel.object3D.traverse((node) => {
          if (node.isMesh) n += 1;
        });
        return n;
      }

      function updatePickerActive() {
        pickerButtons.forEach((btn, i) => {
          btn.classList.toggle("active", i === currentModelIndex);
        });
      }

      function syncAnimationPlayer() {
        const current = MODELS[currentModelIndex];
        arModel.setAttribute("gltf-animation-player", {
          clip: current.clip || "",
          active: Boolean(current.clip),
        });
      }

      function getClipNames() {
        const model = arModel.getObject3D("mesh");
        if (!model?.animations?.length) return [];
        return model.animations.map((c) => c.name);
      }

      function onModelLoaded() {
        modelReady = true;
        syncAnimationPlayer();

        arModel.object3D.traverse((node) => {
          node.frustumCulled = false;
        });

        const current = MODELS[currentModelIndex];
        const meshes = countMeshes();
        const names = getClipNames();

        if (!meshes) {
          setModelStatus("err", `${current.label}: fără mesh în GLB`);
          return;
        }

        if (names.length) {
          setModelStatus(
            "ok",
            `${current.label} — ${meshes} mesh, anim: ${names.join(", ")}`
          );
        } else {
          setModelStatus("ok", `${current.label} — ${meshes} mesh`);
        }
      }

      arModel.addEventListener("anim-started", (evt) => {
        const current = MODELS[currentModelIndex];
        const { clip, running, tracks } = evt.detail;
        setModelStatus(
          "ok",
          `${current.label} — ${clip}${running ? " ▶" : ""} (${tracks} tracks)`
        );
      });

      function onModelError(event) {
        const current = MODELS[currentModelIndex];
        console.error("GLB error", current.url, event.detail);
        setModelStatus("err", `Eroare GLB: ${current.label}`);
        hint.textContent = "Modelul nu s-a încărcat";
        hint.classList.add("visible");
      }

      function loadModel(index) {
        if (index < 0 || index >= MODELS.length) return;

        currentModelIndex = index;
        modelReady = false;
        updatePickerActive();

        const current = MODELS[index];
        setModelStatus("warn", `Se încarcă ${current.label}…`);

        applyScale(manualScale);
        syncAnimationPlayer();

        const player = arModel.components["gltf-animation-player"];
        if (player) player.teardownMixer();

        arModel.removeAttribute("gltf-model");
        requestAnimationFrame(() => {
          arModel.setAttribute("gltf-model", current.url);
        });
      }

      function buildModelPicker() {
        modelPicker.innerHTML = "";
        pickerButtons = MODELS.map((model, index) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.textContent = model.label;
          btn.addEventListener("click", () => loadModel(index));
          modelPicker.appendChild(btn);
          return btn;
        });
        updatePickerActive();
      }

      function showArUI() {
        overlay.classList.add("hidden");
        hint.classList.add("visible");
        modelPicker.classList.add("visible");
        if (scaleControls) scaleControls.classList.add("visible");
        if (modelStatus) modelStatus.classList.add("visible");
        if (debugToggle) debugToggle.classList.add("visible");
        hint.textContent = "Ține camera spre logo-ul Eldrem";
      }

      buildModelPicker();
      if (scaleDown) scaleDown.addEventListener("click", () => changeScale(-1));
      if (scaleUp) scaleUp.addEventListener("click", () => changeScale(1));
      applyScale(1);

      if (debugToggle) {
        debugToggle.addEventListener("click", () => {
          debugOpen = !debugOpen;
          debugToggle.classList.toggle("active", debugOpen);
          debugToggle.setAttribute("aria-pressed", String(debugOpen));
          debugPanel?.classList.toggle("visible", debugOpen);
          if (!debugOpen) markerCanvas?.classList.remove("visible");
          updateDebugPanel();
        });
      }

      arModel.addEventListener("model-loaded", onModelLoaded);
      arModel.addEventListener("model-error", onModelError);

      scene.addEventListener("loaded", () => {
        showArUI();
        loadModel(0);
      });

      nftMarker.addEventListener("markerFound", () => {
        markerTracked = true;
        const name = MODELS[currentModelIndex].label;
        hint.textContent = modelReady
          ? `Logo OK — ${name}`
          : `Logo OK — încarcă ${name}…`;
        updateDebugPanel();
      });

      nftMarker.addEventListener("markerLost", () => {
        markerTracked = false;
        hint.textContent = "Caut logo-ul Eldrem…";
        updateDebugPanel();
      });

      scene.addEventListener("tick", () => {
        if (debugOpen && markerTracked) updateDebugPanel();
      });
    </script>
  </body>
</html>
