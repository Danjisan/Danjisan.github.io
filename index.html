<!DOCTYPE html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>AR Demo — Image Tracking</title>

    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/aframevr/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar-nft.js"></script>

    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        height: 100dvh;
        overflow: hidden;
        touch-action: none;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      }

      /* AR.js pune <video> la rezoluția camerei; fără asta vezi doar un colț */
      a-scene {
        position: fixed !important;
        inset: 0 !important;
        width: 100% !important;
        height: 100% !important;
      }

      a-scene > video,
      a-scene > canvas {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        width: 100vw !important;
        height: 100dvh !important;
        max-width: 100vw !important;
        max-height: 100dvh !important;
        object-fit: cover !important;
        transform: none !important;
      }

      #overlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        background: rgba(0, 0, 0, 0.85);
        color: #fff;
        text-align: center;
        padding: 24px;
        transition: opacity 0.4s ease;
      }

      #overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }

      #overlay p {
        margin: 0;
        max-width: 320px;
        line-height: 1.5;
        opacity: 0.9;
      }

      #hint {
        position: fixed;
        left: 50%;
        bottom: 24px;
        transform: translateX(-50%);
        z-index: 10;
        padding: 10px 16px;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.55);
        color: #fff;
        font-size: 14px;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.3s ease;
      }

      #hint.visible {
        opacity: 1;
      }

      #scale-controls {
        position: fixed;
        top: 50%;
        right: 16px;
        transform: translateY(-50%);
        z-index: 11;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
      }

      #scale-controls.visible {
        opacity: 1;
        pointer-events: auto;
      }

      #scale-controls .scale-label {
        color: #fff;
        font-size: 12px;
        font-weight: 600;
        background: rgba(0, 0, 0, 0.55);
        padding: 4px 10px;
        border-radius: 999px;
        min-width: 3.5rem;
        text-align: center;
      }

      #scale-controls button {
        width: 48px;
        height: 48px;
        border: none;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.6);
        color: #fff;
        font-size: 24px;
        line-height: 1;
        cursor: pointer;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
      }

      #scale-controls button:disabled {
        opacity: 0.35;
        cursor: not-allowed;
      }

      #scale-controls button:not(:disabled):active {
        background: rgba(255, 255, 255, 0.25);
      }
    </style>
  </head>

  <body>
    <div id="overlay">
      <strong>Se încarcă AR…</strong>
      <p>Descriptorii NFT pot dura câteva secunde pe telefon.</p>
    </div>

    <div id="hint" aria-live="polite">Îndreaptă camera spre imaginea marker</div>

    <div id="scale-controls" aria-label="Reglaj scale model">
      <button type="button" id="scale-up" title="Mărește scale">+</button>
      <span class="scale-label" id="scale-value">1.0</span>
      <button type="button" id="scale-down" title="Micșorează scale">−</button>
    </div>

    <a-scene
      vr-mode-ui="enabled: false"
      renderer="logarithmicDepthBuffer: true; alpha: true;"
      arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;"
    >
      <a-nft
        id="nft-marker"
        type="nft"
        smooth="true"
        smoothCount="10"
        smoothTolerance="0.01"
        smoothThreshold="5"
        emitevents="true"
      >
        <a-entity
          id="ar-model"
          position="0 0 0"
          scale="1 1 1"
          animation-mixer="clip: *; loop: repeat"
        ></a-entity>
      </a-nft>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      // NFT: până pui descriptorii în assets/nft/, folosim T-Rex (doar pentru tracking).
      // Model: assets/models/model.glb (al tău).
      const USE_PLACEHOLDER_NFT = true;

      const LOCAL_NFT_URL = "assets/nft/marker";
      const LOCAL_MODEL_URL = "assets/models/model.glb";

      const PLACEHOLDER_NFT_URL =
        "https://raw.githack.com/AR-js-org/AR.js/master/aframe/examples/image-tracking/nft/trex/trex-image/trex";

      const MODEL_SCALE_INITIAL = 1;
      const MODEL_SCALE_STEP = 0.1;
      const MODEL_SCALE_MIN = 1;
      const MODEL_POSITION = "0 0 0";

      const nftUrl = USE_PLACEHOLDER_NFT ? PLACEHOLDER_NFT_URL : LOCAL_NFT_URL;
      const modelUrl = LOCAL_MODEL_URL;

      const nftMarker = document.getElementById("nft-marker");
      const arModel = document.getElementById("ar-model");
      const overlay = document.getElementById("overlay");
      const hint = document.getElementById("hint");
      const scaleControls = document.getElementById("scale-controls");
      const scaleValueEl = document.getElementById("scale-value");
      const scaleUpBtn = document.getElementById("scale-up");
      const scaleDownBtn = document.getElementById("scale-down");

      let modelScale = MODEL_SCALE_INITIAL;

      const scene = document.querySelector("a-scene");

      nftMarker.setAttribute("url", nftUrl);
      arModel.setAttribute("gltf-model", modelUrl);
      arModel.setAttribute("position", MODEL_POSITION);

      function applyModelScale(scale) {
        modelScale = Math.max(MODEL_SCALE_MIN, scale);
        const s = modelScale.toFixed(1);
        arModel.setAttribute("scale", `${s} ${s} ${s}`);
        scaleValueEl.textContent = s;
        scaleDownBtn.disabled = modelScale <= MODEL_SCALE_MIN;
      }

      applyModelScale(MODEL_SCALE_INITIAL);

      scaleUpBtn.addEventListener("click", () => {
        applyModelScale(modelScale + MODEL_SCALE_STEP);
      });

      scaleDownBtn.addEventListener("click", () => {
        applyModelScale(modelScale - MODEL_SCALE_STEP);
      });

      function viewportSize() {
        const vv = window.visualViewport;
        return {
          w: Math.round(vv ? vv.width : window.innerWidth),
          h: Math.round(vv ? vv.height : window.innerHeight),
        };
      }

      function configureArjsForAndroid() {
        const { w, h } = viewportSize();
        scene.setAttribute("arjs", {
          trackingMethod: "best",
          sourceType: "webcam",
          debugUIEnabled: false,
          sourceWidth: 1280,
          sourceHeight: 720,
          displayWidth: w,
          displayHeight: h,
        });
      }

      function fitCameraToScreen() {
        const video = document.querySelector("a-scene > video");
        const canvas = document.querySelector("a-scene > canvas");
        const { w, h } = viewportSize();

        [video, canvas].forEach((el) => {
          if (!el) return;
          el.removeAttribute("width");
          el.removeAttribute("height");
          el.style.position = "fixed";
          el.style.top = "0";
          el.style.left = "0";
          el.style.width = w + "px";
          el.style.height = h + "px";
          el.style.maxWidth = "100vw";
          el.style.maxHeight = "100dvh";
          el.style.objectFit = "cover";
          el.style.transform = "none";
        });
      }

      function scheduleFit() {
        fitCameraToScreen();
        requestAnimationFrame(fitCameraToScreen);
        setTimeout(fitCameraToScreen, 250);
        setTimeout(fitCameraToScreen, 800);
      }

      configureArjsForAndroid();

      window.addEventListener("resize", scheduleFit);
      window.addEventListener("orientationchange", scheduleFit);
      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", scheduleFit);
      }

      scene.addEventListener("loaded", () => {
        scheduleFit();
        const video = document.querySelector("a-scene > video");
        if (video) {
          video.addEventListener("loadedmetadata", scheduleFit);
          video.addEventListener("loadeddata", scheduleFit);
        }
      });

      window.addEventListener("arjs-nft-loaded", () => {
        scheduleFit();
        overlay.classList.add("hidden");
        hint.classList.add("visible");
        scaleControls.classList.add("visible");
        hint.textContent = USE_PLACEHOLDER_NFT
          ? "Demo: scanează imaginea T-Rex (tracking temporar)"
          : "Îndreaptă camera spre imaginea marker";
      });

      nftMarker.addEventListener("markerFound", () => {
        hint.textContent = "Marker detectat";
        hint.classList.add("visible");
      });

      nftMarker.addEventListener("markerLost", () => {
        hint.textContent = USE_PLACEHOLDER_NFT
          ? "Demo: scanează imaginea T-Rex (tracking temporar)"
          : "Îndreaptă camera spre imaginea marker";
      });
    </script>
  </body>
</html>
