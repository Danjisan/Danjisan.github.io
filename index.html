<!DOCTYPE html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>AR Demo — Hiro Marker</title>

    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/aframevr/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar.js"></script>

    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        height: 100dvh;
        overflow: hidden;
        touch-action: none;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      }

      a-scene {
        position: fixed !important;
        inset: 0 !important;
        width: 100% !important;
        height: 100% !important;
      }

      a-scene > video,
      a-scene > canvas {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        width: 100vw !important;
        height: 100dvh !important;
        max-width: 100vw !important;
        max-height: 100dvh !important;
        object-fit: cover !important;
        transform: none !important;
      }

      #overlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        background: rgba(0, 0, 0, 0.85);
        color: #fff;
        text-align: center;
        padding: 24px;
        transition: opacity 0.4s ease;
      }

      #overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }

      #overlay p {
        margin: 0;
        max-width: 320px;
        line-height: 1.5;
        opacity: 0.9;
      }

      #model-status {
        position: fixed;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 12;
        max-width: 90vw;
        padding: 8px 14px;
        border-radius: 8px;
        font-size: 13px;
        line-height: 1.4;
        text-align: center;
        color: #fff;
        background: rgba(0, 0, 0, 0.7);
        opacity: 0;
        transition: opacity 0.3s ease;
      }

      #model-status.visible {
        opacity: 1;
      }

      #model-status.ok {
        background: rgba(20, 120, 60, 0.85);
      }

      #model-status.warn {
        background: rgba(180, 120, 0, 0.9);
      }

      #model-status.err {
        background: rgba(160, 40, 40, 0.9);
      }

      #model-picker {
        position: fixed;
        bottom: 56px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 11;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 8px;
        max-width: 96vw;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
      }

      #model-picker.visible {
        opacity: 1;
        pointer-events: auto;
      }

      #model-picker button {
        padding: 10px 14px;
        border: none;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.65);
        color: #fff;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
      }

      #model-picker button.active {
        background: rgba(50, 110, 200, 0.95);
      }

      #model-picker button:active {
        transform: scale(0.97);
      }

      #hint {
        position: fixed;
        left: 50%;
        bottom: 16px;
        transform: translateX(-50%);
        z-index: 10;
        padding: 8px 14px;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.55);
        color: #fff;
        font-size: 13px;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.3s ease;
      }

      #hint.visible {
        opacity: 1;
      }
    </style>
  </head>

  <body>
    <div id="overlay">
      <strong>Se încarcă AR…</strong>
      <p>Ține camera spre markerul Hiro (print sau pe ecran).</p>
    </div>

    <div id="model-status" role="status" aria-live="polite"></div>

    <div id="model-picker" aria-label="Alege model 3D"></div>

    <div id="hint" aria-live="polite">Îndreaptă camera spre markerul Hiro</div>

    <a-scene
      vr-mode-ui="enabled: false"
      renderer="logarithmicDepthBuffer: true; alpha: true;"
      arjs="sourceType: webcam; debugUIEnabled: false;"
    >
      <a-marker
        id="hiro-marker"
        preset="hiro"
        size="0.1"
        smooth="true"
        smoothCount="5"
        emitevents="true"
      >
        <a-entity
          id="ar-model"
          position="0 0 0"
          rotation="0 0 0"
          scale="1 1 1"
        ></a-entity>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      // Fără auto-scale / auto-centrare — doar URL per buton. Transform din GLB (0,0,0 scale 1).
      const MODELS = [
        { label: "Al meu", url: "assets/models/model.glb" },
        {
          label: "Rață",
          url: "https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Duck/glTF-Binary/Duck.glb",
        },
        {
          label: "Astronaut",
          url: "https://cdn.aframe.io/test-models/models/Astronaut.glb",
        },
      ];

      const hiroMarker = document.getElementById("hiro-marker");
      const arModel = document.getElementById("ar-model");
      const overlay = document.getElementById("overlay");
      const hint = document.getElementById("hint");
      const modelStatus = document.getElementById("model-status");
      const modelPicker = document.getElementById("model-picker");
      const scene = document.querySelector("a-scene");

      let modelReady = false;
      let currentModelIndex = 0;
      let pickerButtons = [];

      function setModelStatus(kind, message) {
        if (!modelStatus) return;
        modelStatus.textContent = message;
        modelStatus.className = kind ? `visible ${kind}` : "visible";
      }

      function updatePickerActive() {
        pickerButtons.forEach((btn, i) => {
          btn.classList.toggle("active", i === currentModelIndex);
        });
      }

      function countMeshes() {
        let n = 0;
        arModel.object3D.traverse((node) => {
          if (node.isMesh) n += 1;
        });
        return n;
      }

      function onModelLoaded() {
        const current = MODELS[currentModelIndex];
        modelReady = true;

        arModel.object3D.traverse((node) => {
          node.frustumCulled = false;
        });

        arModel.removeAttribute("animation-mixer");
        const gltf = arModel.components["gltf-model"];
        if (gltf?.model?.animations?.length) {
          arModel.setAttribute("animation-mixer", "clip: *; loop: repeat");
        }

        const meshes = countMeshes();

        if (!meshes) {
          setModelStatus("err", `${current.label}: fără mesh în GLB`);
        } else {
          setModelStatus("ok", `${current.label} încărcat`);
        }
      }

      function onModelError(event) {
        const current = MODELS[currentModelIndex];
        console.error("GLB error", current.url, event.detail);
        setModelStatus("err", `Eroare: ${current.label}`);
        hint.textContent = "Modelul nu s-a încărcat";
        hint.classList.add("visible");
      }

      function loadModel(index) {
        if (index < 0 || index >= MODELS.length) return;

        currentModelIndex = index;
        modelReady = false;
        updatePickerActive();

        const current = MODELS[index];
        setModelStatus("warn", `Se încarcă ${current.label}…`);

        arModel.removeAttribute("animation-mixer");
        arModel.removeAttribute("gltf-model");
        arModel.setAttribute("position", "0 0 0");
        arModel.setAttribute("rotation", "0 0 0");
        arModel.setAttribute("scale", "1 1 1");

        requestAnimationFrame(() => {
          arModel.setAttribute("gltf-model", current.url);
        });
      }

      function buildModelPicker() {
        modelPicker.innerHTML = "";
        pickerButtons = MODELS.map((model, index) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.textContent = model.label;
          btn.addEventListener("click", () => loadModel(index));
          modelPicker.appendChild(btn);
          return btn;
        });
        updatePickerActive();
      }

      function showArUI() {
        overlay.classList.add("hidden");
        hint.classList.add("visible");
        modelPicker.classList.add("visible");
        if (modelStatus) modelStatus.classList.add("visible");
        hint.textContent = "Scanează markerul Hiro";
      }

      function viewportSize() {
        const vv = window.visualViewport;
        return {
          w: Math.round(vv ? vv.width : window.innerWidth),
          h: Math.round(vv ? vv.height : window.innerHeight),
        };
      }

      function fitCameraToScreen() {
        const video = document.querySelector("a-scene > video");
        const canvas = document.querySelector("a-scene > canvas");
        const { w, h } = viewportSize();

        [video, canvas].forEach((el) => {
          if (!el) return;
          el.removeAttribute("width");
          el.removeAttribute("height");
          el.style.position = "fixed";
          el.style.top = "0";
          el.style.left = "0";
          el.style.width = w + "px";
          el.style.height = h + "px";
          el.style.maxWidth = "100vw";
          el.style.maxHeight = "100dvh";
          el.style.objectFit = "cover";
          el.style.transform = "none";
        });
      }

      function scheduleFit() {
        fitCameraToScreen();
        requestAnimationFrame(fitCameraToScreen);
        setTimeout(fitCameraToScreen, 250);
      }

      buildModelPicker();
      arModel.addEventListener("model-loaded", onModelLoaded);
      arModel.addEventListener("model-error", onModelError);

      window.addEventListener("resize", scheduleFit);
      window.addEventListener("orientationchange", scheduleFit);
      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", scheduleFit);
      }

      scene.addEventListener("loaded", () => {
        scheduleFit();
        showArUI();
        loadModel(0);
        const video = document.querySelector("a-scene > video");
        if (video) {
          video.addEventListener("loadedmetadata", scheduleFit);
        }
      });

      hiroMarker.addEventListener("markerFound", () => {
        const name = MODELS[currentModelIndex].label;
        hint.textContent = modelReady
          ? `Marker OK — ${name}`
          : `Marker OK — încarcă ${name}…`;
      });

      hiroMarker.addEventListener("markerLost", () => {
        hint.textContent = "Îndreaptă camera spre markerul Hiro";
      });
    </script>
  </body>
</html>
