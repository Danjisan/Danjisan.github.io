<!DOCTYPE html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>AR Demo — Hiro Marker</title>

    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/aframevr/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar.js"></script>

    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        height: 100dvh;
        overflow: hidden;
        touch-action: none;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      }

      a-scene {
        position: fixed !important;
        inset: 0 !important;
        width: 100% !important;
        height: 100% !important;
      }

      a-scene > video,
      a-scene > canvas {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        width: 100vw !important;
        height: 100dvh !important;
        max-width: 100vw !important;
        max-height: 100dvh !important;
        object-fit: cover !important;
        transform: none !important;
      }

      #overlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        background: rgba(0, 0, 0, 0.85);
        color: #fff;
        text-align: center;
        padding: 24px;
        transition: opacity 0.4s ease;
      }

      #overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }

      #overlay p {
        margin: 0;
        max-width: 320px;
        line-height: 1.5;
        opacity: 0.9;
      }

      #hint {
        position: fixed;
        left: 50%;
        bottom: 24px;
        transform: translateX(-50%);
        z-index: 10;
        padding: 10px 16px;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.55);
        color: #fff;
        font-size: 14px;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.3s ease;
      }

      #hint.visible {
        opacity: 1;
      }

      #model-status {
        position: fixed;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 12;
        max-width: 90vw;
        padding: 8px 14px;
        border-radius: 8px;
        font-size: 13px;
        line-height: 1.4;
        text-align: center;
        color: #fff;
        background: rgba(0, 0, 0, 0.7);
        opacity: 0;
        transition: opacity 0.3s ease;
      }

      #model-status.visible {
        opacity: 1;
      }

      #model-status.ok {
        background: rgba(20, 120, 60, 0.85);
      }

      #model-status.warn {
        background: rgba(180, 120, 0, 0.9);
      }

      #model-status.err {
        background: rgba(160, 40, 40, 0.9);
      }
    </style>
  </head>

  <body>
    <div id="overlay">
      <strong>Se încarcă AR…</strong>
      <p>Ține camera spre markerul Hiro (print sau pe ecran).</p>
    </div>

    <div id="model-status" role="status" aria-live="polite"></div>

    <div id="hint" aria-live="polite">Îndreaptă camera spre markerul Hiro</div>

    <a-scene
      vr-mode-ui="enabled: false"
      renderer="logarithmicDepthBuffer: true; alpha: true;"
      arjs="sourceType: webcam; debugUIEnabled: false;"
    >
      <a-marker
        id="hiro-marker"
        preset="hiro"
        size="0.1"
        smooth="true"
        smoothCount="5"
        emitevents="true"
      >
        <!-- La fel ca demo-ul oficial: URL direct, fără a-assets / fără HEAD check -->
        <a-entity
          id="ar-model"
          gltf-model="assets/models/model.glb"
          position="0 0 0"
          rotation="0 0 0"
          scale="1 1 1"
        ></a-entity>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const MODEL_SCALE = 1;

      const hiroMarker = document.getElementById("hiro-marker");
      const arModel = document.getElementById("ar-model");
      const overlay = document.getElementById("overlay");
      const hint = document.getElementById("hint");
      const modelStatus = document.getElementById("model-status");
      const scene = document.querySelector("a-scene");

      let modelReady = false;

      function setModelStatus(kind, message) {
        if (!modelStatus) return;
        modelStatus.textContent = message;
        modelStatus.className = kind ? `visible ${kind}` : "visible";
      }

      function countMeshes() {
        let n = 0;
        arModel.object3D.traverse((node) => {
          if (node.isMesh) n += 1;
        });
        return n;
      }

      function onModelLoaded() {
        modelReady = true;

        arModel.object3D.traverse((node) => {
          node.frustumCulled = false;
        });

        const gltf = arModel.components["gltf-model"];
        if (gltf?.model?.animations?.length) {
          arModel.setAttribute("animation-mixer", "clip: *; loop: repeat");
        }

        arModel.setAttribute(
          "scale",
          `${MODEL_SCALE} ${MODEL_SCALE} ${MODEL_SCALE}`
        );

        const meshes = countMeshes();

        if (!meshes) {
          setModelStatus("err", "GLB încărcat dar fără mesh — verifică exportul.");
        } else {
          setModelStatus("ok", `Model OK (${meshes} mesh, scale ${MODEL_SCALE})`);
        }
      }

      function onModelError(event) {
        console.error("GLB error", event.detail);
        setModelStatus("err", "Eroare la încărcarea model.glb");
        hint.textContent = "GLB nu s-a putut încărca";
        hint.classList.add("visible");
      }

      function showArUI() {
        overlay.classList.add("hidden");
        hint.classList.add("visible");
        if (modelStatus) modelStatus.classList.add("visible");
        setModelStatus("warn", "Se încarcă model.glb…");
        hint.textContent = "Scanează markerul Hiro";
      }

      function viewportSize() {
        const vv = window.visualViewport;
        return {
          w: Math.round(vv ? vv.width : window.innerWidth),
          h: Math.round(vv ? vv.height : window.innerHeight),
        };
      }

      function fitCameraToScreen() {
        const video = document.querySelector("a-scene > video");
        const canvas = document.querySelector("a-scene > canvas");
        const { w, h } = viewportSize();

        [video, canvas].forEach((el) => {
          if (!el) return;
          el.removeAttribute("width");
          el.removeAttribute("height");
          el.style.position = "fixed";
          el.style.top = "0";
          el.style.left = "0";
          el.style.width = w + "px";
          el.style.height = h + "px";
          el.style.maxWidth = "100vw";
          el.style.maxHeight = "100dvh";
          el.style.objectFit = "cover";
          el.style.transform = "none";
        });
      }

      function scheduleFit() {
        fitCameraToScreen();
        requestAnimationFrame(fitCameraToScreen);
        setTimeout(fitCameraToScreen, 250);
      }

      arModel.addEventListener("model-loaded", onModelLoaded);
      arModel.addEventListener("model-error", onModelError);

      window.addEventListener("resize", scheduleFit);
      window.addEventListener("orientationchange", scheduleFit);
      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", scheduleFit);
      }

      scene.addEventListener("loaded", () => {
        scheduleFit();
        showArUI();
        const video = document.querySelector("a-scene > video");
        if (video) {
          video.addEventListener("loadedmetadata", scheduleFit);
        }
      });

      hiroMarker.addEventListener("markerFound", () => {
        hint.textContent = modelReady
          ? "Marker Hiro detectat"
          : "Marker OK — așteaptă încărcarea GLB…";
      });

      hiroMarker.addEventListener("markerLost", () => {
        hint.textContent = "Îndreaptă camera spre markerul Hiro";
      });
    </script>
  </body>
</html>
