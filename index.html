<!DOCTYPE html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>AR Demo — Hiro Marker</title>

    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script>
      AFRAME.registerComponent("gltf-animation-player", {
        schema: {
          clip: { type: "string", default: "" },
          active: { type: "boolean", default: true },
        },

        init() {
          this.mixer = null;
          this.action = null;
          this.clock = new THREE.Clock();
          this._onModelLoaded = () => this.setup();
          this._raf = this._loop.bind(this);
          this.el.addEventListener("model-loaded", this._onModelLoaded);
          this._rafId = requestAnimationFrame(this._raf);
        },

        _loop() {
          if (this.mixer) {
            this.mixer.update(this.clock.getDelta());
          }
          this._rafId = requestAnimationFrame(this._raf);
        },

        setup() {
          this.teardownMixer();

          if (!this.data.active) return;

          const model = this.el.getObject3D("mesh");
          if (!model?.animations?.length) return;

          const clips = model.animations;
          const wanted = (this.data.clip || "").toLowerCase();
          const clip =
            clips.find((c) => c.name.toLowerCase() === wanted) ||
            clips.find((c) => c.name === this.data.clip) ||
            clips[0];

          this.mixer = new THREE.AnimationMixer(model);
          this.action = this.mixer.clipAction(clip);
          this.action.enabled = true;
          this.action.setEffectiveWeight(1);
          this.action.setLoop(THREE.LoopRepeat, Infinity);
          this.action.clampWhenFinished = false;
          this.action.reset();
          this.action.play();

          this.el.emit("anim-started", {
            clip: clip.name,
            running: this.action.isRunning(),
            tracks: clip.tracks.length,
          });
        },

        teardownMixer() {
          if (this.mixer) {
            this.mixer.stopAllAction();
          }
          this.mixer = null;
          this.action = null;
          this.clock = new THREE.Clock();
        },

        tick(_t, dt) {
          if (this.mixer && dt > 0) {
            this.mixer.update(dt / 1000);
          }
        },

        update(oldData) {
          if (
            oldData.clip !== this.data.clip ||
            oldData.active !== this.data.active
          ) {
            this.setup();
          }
        },

        remove() {
          this.el.removeEventListener("model-loaded", this._onModelLoaded);
          if (this._rafId) {
            cancelAnimationFrame(this._rafId);
          }
          this.teardownMixer();
        },
      });
    </script>

    <style>
      html,
      body {
        margin: 0;
        overflow: hidden;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      }

      #overlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        background: rgba(0, 0, 0, 0.85);
        color: #fff;
        text-align: center;
        padding: 24px;
        transition: opacity 0.4s ease;
      }

      #overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }

      #overlay p {
        margin: 0;
        max-width: 320px;
        line-height: 1.5;
        opacity: 0.9;
      }

      #model-status {
        position: fixed;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 12;
        max-width: 90vw;
        padding: 8px 14px;
        border-radius: 8px;
        font-size: 13px;
        line-height: 1.4;
        text-align: center;
        color: #fff;
        background: rgba(0, 0, 0, 0.7);
        opacity: 0;
        transition: opacity 0.3s ease;
      }

      #model-status.visible {
        opacity: 1;
      }

      #model-status.ok {
        background: rgba(20, 120, 60, 0.85);
      }

      #model-status.warn {
        background: rgba(180, 120, 0, 0.9);
      }

      #model-status.err {
        background: rgba(160, 40, 40, 0.9);
      }

      #model-picker {
        position: fixed;
        bottom: 56px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 11;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 8px;
        max-width: 96vw;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
      }

      #model-picker.visible {
        opacity: 1;
        pointer-events: auto;
      }

      #model-picker button {
        padding: 10px 14px;
        border: none;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.65);
        color: #fff;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
      }

      #model-picker button.active {
        background: rgba(50, 110, 200, 0.95);
      }

      #hint {
        position: fixed;
        left: 50%;
        bottom: 16px;
        transform: translateX(-50%);
        z-index: 10;
        padding: 8px 14px;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.55);
        color: #fff;
        font-size: 13px;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.3s ease;
      }

      #hint.visible {
        opacity: 1;
      }
    </style>
  </head>

  <body>
    <div id="overlay">
      <strong>Se încarcă AR…</strong>
      <p>Ține camera spre markerul Hiro (print sau pe ecran).</p>
    </div>

    <div id="model-status" role="status" aria-live="polite"></div>

    <div id="model-picker" aria-label="Alege model 3D"></div>

    <div id="hint" aria-live="polite">Îndreaptă camera spre markerul Hiro</div>

    <!-- La fel ca basic.html AR.js: embedded arjs, marker simplu, fără resize video/canvas -->
    <a-scene embedded arjs>
      <a-marker preset="hiro">
        <a-entity
          id="ar-model"
          position="0 0 0"
          rotation="0 0 0"
          scale="1 1 1"
          gltf-animation-player="clip: Animation"
        ></a-entity>
      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>

    <script>
      // label = buton; url = GLB; scale = mărime din fișier (1 = fără scalare)
      const MODELS = [
        {
          label: "Al meu",
          url: "assets/models/model.glb",
          scale: 1,
          clip: "Animation",
        },
        {
          label: "Rață",
          url: "https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Duck/glTF-Binary/Duck.glb",
          scale: 1,
        },
      ];

      const hiroMarker = document.querySelector("a-marker");
      const arModel = document.getElementById("ar-model");
      const overlay = document.getElementById("overlay");
      const hint = document.getElementById("hint");
      const modelStatus = document.getElementById("model-status");
      const modelPicker = document.getElementById("model-picker");
      const scene = document.querySelector("a-scene");

      let modelReady = false;
      let currentModelIndex = 0;
      let pickerButtons = [];

      function setModelStatus(kind, message) {
        if (!modelStatus) return;
        modelStatus.textContent = message;
        modelStatus.className = kind ? `visible ${kind}` : "visible";
      }

      function applyScale(s) {
        arModel.setAttribute("scale", `${s} ${s} ${s}`);
      }

      function updatePickerActive() {
        pickerButtons.forEach((btn, i) => {
          btn.classList.toggle("active", i === currentModelIndex);
        });
      }

      function getClipNames() {
        const model = arModel.getObject3D("mesh");
        if (!model?.animations?.length) return [];
        return model.animations.map((c) => c.name);
      }

      function syncAnimationPlayer() {
        const current = MODELS[currentModelIndex];
        arModel.setAttribute("gltf-animation-player", {
          clip: current.clip || "",
          active: Boolean(current.clip),
        });
      }

      function onModelLoaded() {
        modelReady = true;
        syncAnimationPlayer();

        const current = MODELS[currentModelIndex];
        const names = getClipNames();
        if (names.length) {
          setModelStatus("ok", `${current.label} — anim: ${names.join(", ")}`);
        } else {
          setModelStatus("ok", `${current.label} încărcat`);
        }
      }

      arModel.addEventListener("anim-started", (evt) => {
        const current = MODELS[currentModelIndex];
        const { clip, running, tracks } = evt.detail;
        setModelStatus(
          "ok",
          `${current.label} — ${clip}${running ? " ▶" : " oprit"} (${tracks} tracks)`
        );
      });

      function onModelError(event) {
        const current = MODELS[currentModelIndex];
        console.error("GLB error", current.url, event.detail);
        setModelStatus("err", `Eroare: ${current.label}`);
        hint.textContent = "Modelul nu s-a încărcat";
        hint.classList.add("visible");
      }

      function loadModel(index) {
        if (index < 0 || index >= MODELS.length) return;

        currentModelIndex = index;
        modelReady = false;
        updatePickerActive();

        const current = MODELS[index];
        setModelStatus("warn", `Se încarcă ${current.label}…`);

        arModel.setAttribute("position", "0 0 0");
        arModel.setAttribute("rotation", "0 0 0");
        applyScale(current.scale);
        syncAnimationPlayer();

        const player = arModel.components["gltf-animation-player"];
        if (player) player.teardownMixer();

        arModel.removeAttribute("gltf-model");
        requestAnimationFrame(() => {
          arModel.setAttribute("gltf-model", current.url);
        });
      }

      function buildModelPicker() {
        modelPicker.innerHTML = "";
        pickerButtons = MODELS.map((model, index) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.textContent = model.label;
          btn.addEventListener("click", () => loadModel(index));
          modelPicker.appendChild(btn);
          return btn;
        });
        updatePickerActive();
      }

      function showArUI() {
        overlay.classList.add("hidden");
        hint.classList.add("visible");
        modelPicker.classList.add("visible");
        if (modelStatus) modelStatus.classList.add("visible");
        hint.textContent = "Scanează markerul Hiro";
      }

      buildModelPicker();
      arModel.addEventListener("model-loaded", onModelLoaded);
      arModel.addEventListener("model-error", onModelError);

      scene.addEventListener("loaded", () => {
        showArUI();
        updatePickerActive();
        loadModel(0);
      });

      hiroMarker.addEventListener("markerFound", () => {
        const name = MODELS[currentModelIndex].label;
        hint.textContent = modelReady
          ? `Marker OK — ${name}`
          : `Marker OK — încarcă ${name}…`;
      });

      hiroMarker.addEventListener("markerLost", () => {
        hint.textContent = "Îndreaptă camera spre markerul Hiro";
      });
    </script>
  </body>
</html>
