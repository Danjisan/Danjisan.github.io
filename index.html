<!DOCTYPE html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>AR Demo — Hiro Marker</title>

    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/aframevr/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar.js"></script>

    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        height: 100dvh;
        overflow: hidden;
        touch-action: none;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      }

      a-scene {
        position: fixed !important;
        inset: 0 !important;
        width: 100% !important;
        height: 100% !important;
      }

      a-scene > video,
      a-scene > canvas {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        width: 100vw !important;
        height: 100dvh !important;
        max-width: 100vw !important;
        max-height: 100dvh !important;
        object-fit: cover !important;
        transform: none !important;
      }

      #overlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        background: rgba(0, 0, 0, 0.85);
        color: #fff;
        text-align: center;
        padding: 24px;
        transition: opacity 0.4s ease;
      }

      #overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }

      #overlay p {
        margin: 0;
        max-width: 320px;
        line-height: 1.5;
        opacity: 0.9;
      }

      #hint {
        position: fixed;
        left: 50%;
        bottom: 24px;
        transform: translateX(-50%);
        z-index: 10;
        padding: 10px 16px;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.55);
        color: #fff;
        font-size: 14px;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.3s ease;
      }

      #hint.visible {
        opacity: 1;
      }
    </style>
  </head>

  <body>
    <div id="overlay">
      <strong>Se încarcă AR…</strong>
      <p>Ține camera spre markerul Hiro (print sau pe ecran).</p>
    </div>

    <div id="hint" aria-live="polite">Îndreaptă camera spre markerul Hiro</div>

    <a-scene
      vr-mode-ui="enabled: false"
      renderer="logarithmicDepthBuffer: true; alpha: true;"
      arjs="sourceType: webcam; debugUIEnabled: false;"
    >
      <a-assets timeout="120000">
        <a-asset-item
          id="modelAsset"
          src="assets/models/model.glb"
          response-type="arraybuffer"
        ></a-asset-item>
      </a-assets>

      <a-marker
        id="hiro-marker"
        preset="hiro"
        size="0.1"
        smooth="true"
        smoothCount="5"
        emitevents="true"
      >
        <a-entity id="ar-model" position="0 0 0" scale="0.05 0.05 0.05"></a-entity>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const LOCAL_MODEL_URL = "assets/models/model.glb";

      const hiroMarker = document.getElementById("hiro-marker");
      const arModel = document.getElementById("ar-model");
      const overlay = document.getElementById("overlay");
      const hint = document.getElementById("hint");
      const scene = document.querySelector("a-scene");

      let modelReady = false;

      function onModelLoaded() {
        modelReady = true;
        arModel.setAttribute("visible", true);
        arModel.object3D.traverse((node) => {
          node.frustumCulled = false;
        });

        const gltf = arModel.components["gltf-model"];
        if (gltf?.model?.animations?.length) {
          arModel.setAttribute("animation-mixer", "clip: *; loop: repeat");
        }

        hint.textContent = "Scanează markerul Hiro";
      }

      function onModelError(event) {
        console.error("GLB load error", event.detail);
        hint.textContent = "Eroare la încărcarea model.glb";
        hint.classList.add("visible");
      }

      function showArUI() {
        overlay.classList.add("hidden");
        hint.classList.add("visible");
        hint.textContent = "Scanează markerul Hiro";
      }

      function viewportSize() {
        const vv = window.visualViewport;
        return {
          w: Math.round(vv ? vv.width : window.innerWidth),
          h: Math.round(vv ? vv.height : window.innerHeight),
        };
      }

      function fitCameraToScreen() {
        const video = document.querySelector("a-scene > video");
        const canvas = document.querySelector("a-scene > canvas");
        const { w, h } = viewportSize();

        [video, canvas].forEach((el) => {
          if (!el) return;
          el.removeAttribute("width");
          el.removeAttribute("height");
          el.style.position = "fixed";
          el.style.top = "0";
          el.style.left = "0";
          el.style.width = w + "px";
          el.style.height = h + "px";
          el.style.maxWidth = "100vw";
          el.style.maxHeight = "100dvh";
          el.style.objectFit = "cover";
          el.style.transform = "none";
        });
      }

      function scheduleFit() {
        fitCameraToScreen();
        requestAnimationFrame(fitCameraToScreen);
        setTimeout(fitCameraToScreen, 250);
        setTimeout(fitCameraToScreen, 800);
      }

      document
        .getElementById("modelAsset")
        .setAttribute("src", LOCAL_MODEL_URL);

      arModel.addEventListener("model-loaded", onModelLoaded);
      arModel.addEventListener("model-error", onModelError);
      arModel.setAttribute("gltf-model", "#modelAsset");

      window.addEventListener("resize", scheduleFit);
      window.addEventListener("orientationchange", scheduleFit);
      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", scheduleFit);
      }

      scene.addEventListener("loaded", () => {
        scheduleFit();
        showArUI();
        const video = document.querySelector("a-scene > video");
        if (video) {
          video.addEventListener("loadedmetadata", scheduleFit);
          video.addEventListener("loadeddata", scheduleFit);
        }
      });

      hiroMarker.addEventListener("markerFound", () => {
        hint.textContent = modelReady
          ? "Marker Hiro detectat"
          : "Marker detectat — modelul se încarcă…";
      });

      hiroMarker.addEventListener("markerLost", () => {
        hint.textContent = "Îndreaptă camera spre markerul Hiro";
      });
    </script>
  </body>
</html>
