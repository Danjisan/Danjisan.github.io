<!DOCTYPE html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>AR Demo — Image Tracking</title>

    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/aframevr/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar-nft.js"></script>

    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        height: 100dvh;
        overflow: hidden;
        touch-action: none;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      }

      /* AR.js pune <video> la rezoluția camerei; fără asta vezi doar un colț */
      a-scene {
        position: fixed !important;
        inset: 0 !important;
        width: 100% !important;
        height: 100% !important;
      }

      a-scene > video,
      a-scene > canvas {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        width: 100vw !important;
        height: 100dvh !important;
        max-width: 100vw !important;
        max-height: 100dvh !important;
        object-fit: cover !important;
        transform: none !important;
      }

      #overlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        background: rgba(0, 0, 0, 0.85);
        color: #fff;
        text-align: center;
        padding: 24px;
        transition: opacity 0.4s ease;
      }

      #overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }

      #overlay p {
        margin: 0;
        max-width: 320px;
        line-height: 1.5;
        opacity: 0.9;
      }

      #hint {
        position: fixed;
        left: 50%;
        bottom: 24px;
        transform: translateX(-50%);
        z-index: 10;
        padding: 10px 16px;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.55);
        color: #fff;
        font-size: 14px;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.3s ease;
      }

      #hint.visible {
        opacity: 1;
      }

      .ar-panel {
        position: fixed;
        top: 50%;
        transform: translateY(-50%);
        z-index: 11;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
      }

      .ar-panel.visible {
        opacity: 1;
        pointer-events: auto;
      }

      #scale-controls {
        right: 16px;
      }

      #position-controls {
        left: 16px;
      }

      .ar-panel .panel-label {
        color: #fff;
        font-size: 12px;
        font-weight: 600;
        background: rgba(0, 0, 0, 0.55);
        padding: 4px 10px;
        border-radius: 999px;
        min-width: 3.5rem;
        text-align: center;
      }

      .ar-panel button {
        width: 48px;
        height: 48px;
        border: none;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.6);
        color: #fff;
        font-size: 24px;
        line-height: 1;
        cursor: pointer;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
      }

      .ar-panel button:disabled {
        opacity: 0.35;
        cursor: not-allowed;
      }

      .ar-panel button:not(:disabled):active {
        background: rgba(255, 255, 255, 0.25);
      }
    </style>
  </head>

  <body>
    <div id="overlay">
      <strong>Se încarcă AR…</strong>
      <p>Descriptorii NFT pot dura câteva secunde pe telefon.</p>
    </div>

    <div id="hint" aria-live="polite">Îndreaptă camera spre imaginea marker</div>

    <div id="position-controls" class="ar-panel" aria-label="Reglaj înălțime model">
      <button type="button" id="pos-y-up" title="Ridică modelul">▲</button>
      <span class="panel-label" id="pos-y-value">Y:0</span>
      <button type="button" id="pos-y-down" title="Coboară modelul">▼</button>
    </div>

    <div id="scale-controls" class="ar-panel" aria-label="Reglaj scale model">
      <button type="button" id="scale-up" title="Mărește scale">+</button>
      <span class="panel-label" id="scale-value">10</span>
      <button type="button" id="scale-down" title="Micșorează scale">−</button>
    </div>

    <a-scene
      vr-mode-ui="enabled: false"
      renderer="logarithmicDepthBuffer: true; alpha: true;"
      arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false; sourceWidth: 1280; sourceHeight: 720; displayWidth: 1280; displayHeight: 720;"
    >
      <a-assets timeout="120000">
        <a-asset-item
          id="modelAsset"
          src="assets/models/model.glb"
          response-type="arraybuffer"
        ></a-asset-item>
      </a-assets>

      <a-nft
        id="nft-marker"
        type="nft"
        smooth="true"
        smoothCount="15"
        smoothTolerance="0.01"
        smoothThreshold="8"
        emitevents="true"
      >
        <a-entity
          id="ar-model"
          position="0 -50 0"
          scale="10 10 10"
        ></a-entity>
      </a-nft>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      // NFT: până pui descriptorii în assets/nft/, folosim T-Rex (doar pentru tracking).
      // Model: assets/models/model.glb (al tău).
      const USE_PLACEHOLDER_NFT = true;

      const LOCAL_NFT_URL = "assets/nft/marker";
      const LOCAL_MODEL_URL = "assets/models/model.glb";

      const PLACEHOLDER_NFT_URL =
        "https://raw.githack.com/AR-js-org/AR.js/master/aframe/examples/image-tracking/nft/trex/trex-image/trex";

      // NFT folosește valori mari (demo T-Rex: scale 5). Scale 1 e adesea invizibil.
      const MODEL_SCALE_INITIAL = 10;
      const MODEL_SCALE_STEP = 1;
      const MODEL_SCALE_MIN = 1;

      // Coordonate NFT (nu metri). +Y = mai sus pe marker, -Y = mai jos.
      const MODEL_POS_X = 0;
      const MODEL_POS_Y_INITIAL = -50;
      const MODEL_POS_Z = 0;
      const MODEL_POS_Y_STEP = 10;

      const nftUrl = USE_PLACEHOLDER_NFT ? PLACEHOLDER_NFT_URL : LOCAL_NFT_URL;
      const modelUrl = LOCAL_MODEL_URL;

      const nftMarker = document.getElementById("nft-marker");
      const arModel = document.getElementById("ar-model");
      const overlay = document.getElementById("overlay");
      const hint = document.getElementById("hint");
      const scaleControls = document.getElementById("scale-controls");
      const positionControls = document.getElementById("position-controls");
      const scaleValueEl = document.getElementById("scale-value");
      const posYValueEl = document.getElementById("pos-y-value");
      const scaleUpBtn = document.getElementById("scale-up");
      const scaleDownBtn = document.getElementById("scale-down");
      const posYUpBtn = document.getElementById("pos-y-up");
      const posYDownBtn = document.getElementById("pos-y-down");

      let modelScale = MODEL_SCALE_INITIAL;
      let modelPosY = MODEL_POS_Y_INITIAL;
      let modelReady = false;

      const scene = document.querySelector("a-scene");
      let arReady = false;

      function applyModelPosition() {
        arModel.setAttribute(
          "position",
          `${MODEL_POS_X} ${modelPosY} ${MODEL_POS_Z}`
        );
        posYValueEl.textContent = `Y:${modelPosY}`;
      }

      function applyModelScale(scale) {
        modelScale = Math.max(MODEL_SCALE_MIN, scale);
        const label =
          Math.abs(modelScale - Math.round(modelScale)) < 0.001
            ? String(Math.round(modelScale))
            : modelScale.toFixed(1);
        arModel.setAttribute("scale", `${modelScale} ${modelScale} ${modelScale}`);
        scaleValueEl.textContent = label;
        scaleDownBtn.disabled = modelScale <= MODEL_SCALE_MIN;
      }

      function onModelLoaded() {
        modelReady = true;
        arModel.setAttribute("visible", true);

        arModel.object3D.traverse((node) => {
          node.frustumCulled = false;
        });

        const gltf = arModel.components["gltf-model"];
        if (gltf?.model?.animations?.length) {
          arModel.setAttribute("animation-mixer", "clip: *; loop: repeat");
        }

        hint.textContent = USE_PLACEHOLDER_NFT
          ? "Model încărcat — scanează T-Rex"
          : "Model încărcat — scanează markerul";
      }

      function onModelError(event) {
        console.error("GLB load error", event.detail);
        hint.textContent = "Eroare la încărcarea model.glb";
        hint.classList.add("visible");
      }

      applyModelScale(MODEL_SCALE_INITIAL);
      applyModelPosition();

      posYUpBtn.addEventListener("click", () => {
        modelPosY += MODEL_POS_Y_STEP;
        applyModelPosition();
      });

      posYDownBtn.addEventListener("click", () => {
        modelPosY -= MODEL_POS_Y_STEP;
        applyModelPosition();
      });

      scaleUpBtn.addEventListener("click", () => {
        applyModelScale(modelScale + MODEL_SCALE_STEP);
      });

      scaleDownBtn.addEventListener("click", () => {
        applyModelScale(modelScale - MODEL_SCALE_STEP);
      });

      function viewportSize() {
        const vv = window.visualViewport;
        return {
          w: Math.round(vv ? vv.width : window.innerWidth),
          h: Math.round(vv ? vv.height : window.innerHeight),
        };
      }

      function fitCameraToScreen() {
        const video = document.querySelector("a-scene > video");
        const canvas = document.querySelector("a-scene > canvas");
        const { w, h } = viewportSize();

        [video, canvas].forEach((el) => {
          if (!el) return;
          el.removeAttribute("width");
          el.removeAttribute("height");
          el.style.position = "fixed";
          el.style.top = "0";
          el.style.left = "0";
          el.style.width = w + "px";
          el.style.height = h + "px";
          el.style.maxWidth = "100vw";
          el.style.maxHeight = "100dvh";
          el.style.objectFit = "cover";
          el.style.transform = "none";
        });
      }

      function scheduleFit() {
        fitCameraToScreen();
        requestAnimationFrame(fitCameraToScreen);
        setTimeout(fitCameraToScreen, 250);
        setTimeout(fitCameraToScreen, 800);
      }

      function showArUI() {
        if (arReady) return;
        arReady = true;
        scheduleFit();
        overlay.classList.add("hidden");
        hint.classList.add("visible");
        scaleControls.classList.add("visible");
        positionControls.classList.add("visible");
        hint.textContent = USE_PLACEHOLDER_NFT
          ? "Demo: scanează imaginea T-Rex (tracking temporar)"
          : "Îndreaptă camera spre imaginea marker";
      }

      document
        .getElementById("modelAsset")
        .setAttribute("src", LOCAL_MODEL_URL);

      arModel.addEventListener("model-loaded", onModelLoaded);
      arModel.addEventListener("model-error", onModelError);

      nftMarker.setAttribute("url", nftUrl);
      arModel.setAttribute("gltf-model", "#modelAsset");

      window.addEventListener("resize", scheduleFit);
      window.addEventListener("orientationchange", scheduleFit);
      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", scheduleFit);
      }

      scene.addEventListener("loaded", () => {
        scheduleFit();
        const video = document.querySelector("a-scene > video");
        if (video) {
          video.addEventListener("loadedmetadata", scheduleFit);
          video.addEventListener("loadeddata", scheduleFit);
        }
      });

      window.addEventListener("arjs-nft-loaded", showArUI);

      // Dacă descriptorii NFT nu raportează loaded (rețea / reset AR.js)
      setTimeout(() => {
        if (!arReady) showArUI();
      }, 20000);

      nftMarker.addEventListener("markerFound", () => {
        hint.textContent = modelReady
          ? "Marker detectat"
          : "Marker detectat — modelul se încarcă…";
        hint.classList.add("visible");
      });

      nftMarker.addEventListener("markerLost", () => {
        hint.textContent = USE_PLACEHOLDER_NFT
          ? "Demo: scanează imaginea T-Rex (tracking temporar)"
          : "Îndreaptă camera spre imaginea marker";
      });
    </script>
  </body>
</html>
